model:
  name: "HuggingFaceTB/SmolLM2-360M-Instruct"
  mode: "action"        # action | text_action
  dtype: "float32"
  vit_model_type: "google/siglip2-base-patch16-512"
  lora:
    enabled: true
    r: 16
    alpha: 32
    dropout: 0.05
    target_modules: [q_proj, v_proj, k_proj, o_proj]

prompts:
  prompt_type: "simple"  # simple | with_description

image_processor:
  max_img_size: 16      # 1 patch
  splitted_image_size: 16
  mp_image_token_length: 1

modality_projector:
  pixel_shuffle_factor: 1
  # Note: num_patches from ViT must be divisible by (pixel_shuffle_factor^2)
  # 512x512 image = 32x32 patches = 1024 patches
  # 1024 is divisible by 16 (4^2), so 1024 / 16 = 64 output tokens

dataset:
  path: "nanovlm/data/minigrid/dataset.jsonl"
  val_split: 0.2
  max_length: 512

training:
  method: "sft"         # sft | grpo
  epochs: 5
  batch_size: 8
  lr: 1.0e-4
  weight_decay: 0.01
  warmup_steps: 300
  max_grad_norm: 1.0
  seed: 42
  device: "auto"        # auto | cuda | mps | cpu
  num_workers: 0
  save_interval: 1
  output_dir: "nanovlm/checkpoints/sft_baseline"
  init_from_checkpoint: null

grpo:
  num_episodes: 100     # episodes per GRPO update
  num_updates: 50       # total GRPO training iterations
  kl_beta: 0.1          # KL divergence weight
  entropy_weight: 0.01  # entropy regularization weight
  num_trajectory_batch: 32  # trajectories per training batch

env:
  name: "MiniGrid-Empty-8x8-v0"
  max_steps: 100
  num_actions: 7

eval:
  num_episodes: 5
  max_steps: 20
